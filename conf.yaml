# =====================
# 시스템 설정
# =====================
system_config:
  # 설정 파일 버전
  # 나중에 설정 구조 바뀔 때 구분용
  conf_version: "v1.0.0"

  # 웹서버 주소
  # localhost = 내 컴퓨터에서만 접속
  host: "localhost"

  # 웹서버 포트
  # 접속 주소: http://localhost:12393
  port: 12393

  # 도구 프롬프트 설정
  # 지금 값은 실제 프롬프트 내용이 아니라 "프롬프트 이름/파일명" 역할
  tool_prompts:
    # VRM 표정 제어 규칙 프롬프트
    # 나중에 AI가 표정 변경 명령을 만들 때 사용
    vrm_expression_prompt: "## VRM 표정 규칙\n\n답변할 때 감정에 맞는 표정 태그를 자연스럽게 사용해라.\n표정 태그는 문장 끝이나 감정이 바뀌는 위치에 넣어라.\n\n사용 가능한 표정 태그는 아래만 허용한다.:\n-[joy]\n\n예시:\n안녕 범석아. [joy]"

    # 그룹 대화 규칙 프롬프트
    # 여러 사람이 말할 때 누가 말했는지 구분하는 용도
    # 현재 1:1 채팅에서는 아직 안 씀
    group_conversation_prompt: "group_conversation_prompt" #아직안씀

    # AI가 먼저 말 걸기 규칙 프롬프트
    # 지금은 뺄 예정 / 나중에 proactive 기능 만들 때 사용
    proactive_speak_prompt: "proactive_speak_prompt" #아직안씀
    # 도구 사용 안내 프롬프트
    # AI가 언제 어떤 도구를 써야 하는지 알려주는 규칙
    tool_guidance_prompt: "## 도구 사용 규칙\n\n너는 사용 가능한 tools를 호출할 수 있다."


# =====================
# 캐릭터 설정
# =====================
character_config:
  # VRM 모델 이름
  # 나중에 VRM 모델 파일 불러올 때 사용
  vrm_model_name: "models/avatar.vrm" #아직안씀

  # AI 캐릭터 이름
  # 프롬프트, UI 표시 등에 사용
  character_name: "avatar"

  # AI 프로필 이미지 파일
  # 나중에 UI 프로필 이미지에 사용
  avatar: "models/avatar.png" #아직안씀

  # AI 성격/말투 프롬프트
  # 비어있으면 추가 성격 없음
  # 예: "범석에게 반말로 짧게 대답해."
  persona_prompt: "너는 {character_name}이다."


# =====================
# 에이전트 설정
# =====================
agent_config:
  # 사용할 대화 에이전트 선택
  # 지금은 basic_memory_agent만 사용
  conversation_agent_choice: "basic_memory_agent"

  basic_memory_agent:
    # 사용할 LLM 제공자 이름
    # 아래 llm_configs 안의 ollama_llm을 선택한다는 뜻
    llm_provider: "ollama_llm"

    # 문장 분리 방식
    # 나중에 긴 답변을 문장 단위로 자를 때 사용
    segment_method: "pysbd" #아직안씀


# =====================
# LLM 설정
# =====================
llm_configs:
  ollama_llm:
    base_url: "http://localhost:11434/v1/chat/completions"
    model: "exaone3.5:7.8b"
    stream: false
    temperature: 0.5
    tools:
      - save_memory
      - load_memory
    user: "범석"